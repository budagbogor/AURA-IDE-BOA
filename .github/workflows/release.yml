name: Create Professional Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0, v1.1.0

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Web App
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-ide-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri App
        run: npm run tauri build

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-ide-windows-exe
          path: src-tauri/target/release/bundle/msi/*.msi # Tauri usually bundles to MSI or EXE

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: aura-ide-android-apk
          path: artifacts

      - name: Download Windows Assets
        uses: actions/download-artifact@v4
        with:
          name: aura-ide-windows-exe
          path: artifacts

      - name: Rename Files for Release
        run: |
          mv artifacts/app-debug.apk artifacts/AuraIDE-Android.apk
          # Finds the msi/exe and renames it
          find artifacts -name "*.msi" -exec mv {} artifacts/AuraIDE-Windows-Installer.msi \; || true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/AuraIDE-Android.apk
            artifacts/AuraIDE-Windows-Installer.msi
          name: Release ${{ github.ref_name }}
          body: |
            ## Aura AI IDE Official Release ${{ github.ref_name }}
            
            ### Downloads
            - [AuraIDE-Android.apk](artifacts/AuraIDE-Android.apk)
            - [AuraIDE-Windows-Installer.msi](artifacts/AuraIDE-Windows-Installer.msi)
            
            ### Changes in this version
            - Automatically generated professional build.
            - Includes both Desktop (Windows) and Mobile (Android) versions.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
